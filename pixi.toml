[workspace]
authors = ["kaspermunch <kaspermunch@birc.au.dk>"]
channels = ["conda-forge", "bioconda", "munch-group"]
name = "relate-tree-exercise"
platforms = ["linux-64"]
version = "0.1.0"

[activation.env]
PATH = "$HOME/populationgenomics/software/relate/bin:$HOME/populationgenomics/software/relate/scripts/DetectSelection:$HOME/populationgenomics/software/relate/scripts/EstimatePopulationSize:$HOME/populationgenomics/software/relate/scripts/EstimatePopulationSizeSGE:$HOME/populationgenomics/software/relate/scripts/PrepareInputFiles:$HOME/populationgenomics/software/relate/scripts/RelateLSF:$HOME/populationgenomics/software/relate/scripts/RelateParallel:$HOME/populationgenomics/software/relate/scripts/RelateSGE:$HOME/populationgenomics/software/relate/scripts/RelateSlurm:$HOME/populationgenomics/software/relate/scripts/SampleBranchLengths:$HOME/populationgenomics/software/relate/scripts/TreeView:$PATH"

[tasks]

[dependencies]
jupyter = ">=1.1.1,<2"
seaborn = ">=0.13.2,<0.14"
git = ">=2.53.0,<3"
gh = ">=2.87.0,<3"
ipykernel = ">=7.2.0,<8"
nbconvert = ">=7.17.0,<8"
vscodenb = ">=0.1.34,<0.2"
r-essentials = ">=4.5,<5"
tskit = ">=1.0.1,<2"
cairosvg = ">=2.8.2,<3"
bcftools = ">=1.22,<2"
r-gridextra = ">=2.3,<3"
geneinfo = ">=5.6.24,<6"
pyarrow = ">=23.0.1,<24"

